<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kemo Store | شحن ألعاب</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

    <style>
        :root { 
            --bg-dark: #0f141e; --bg-card: #18202f; --primary: #f89e1b; --primary-hover: #d97706; 
            --accent: #8B5CF6; --text-main: #F3F4F6; --text-muted: #9CA3AF; --danger: #EF4444; 
            --success: #10B981; --whatsapp: #25D366; --border-color: #2a3447;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }
        
        header { background: var(--bg-card); position: sticky; top: 0; z-index: 1000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 24px; font-weight: 900; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .logo i { color: var(--accent); }
        
        .nav-actions { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        
        .icon-btn-wrapper { display: flex; gap: 10px; }
        .cart-icon-btn { background: var(--bg-dark); border: 1px solid var(--border-color); width: 45px; height: 45px; border-radius: 12px; font-size: 18px; color: var(--text-main); cursor: pointer; position: relative; transition: 0.3s; display: flex; justify-content: center; align-items: center; }
        .cart-icon-btn:hover { border-color: var(--primary); color: var(--primary); }
        .cart-icon-btn.heart-icon:hover { border-color: var(--danger); color: var(--danger); }
        .cart-badge { position: absolute; top: -5px; right: -5px; background: var(--primary); color: #000; font-size: 11px; font-weight: 900; width: 20px; height: 20px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 2px solid var(--bg-card); }

        .user-area { display: flex; align-items: center; gap: 10px; }
        .btn-google { background: var(--accent); border: none; color: #fff; padding: 8px 15px; border-radius: 10px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; font-size: 14px;}
        .btn-google img { width: 16px; background: white; border-radius: 50%; padding: 2px;}
        
        .user-profile { display: flex; align-items: center; gap: 8px; background: var(--bg-dark); padding: 5px 15px 5px 5px; border-radius: 30px; border: 1px solid var(--border-color); }
        .user-profile img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
        .user-profile span { font-weight: 700; font-size: 14px; }
        .btn-logout-small { background: transparent; border: none; color: var(--danger); cursor: pointer; font-size: 16px; padding: 5px; }

        .btn-admin-nav { display: none; background: var(--primary); color: #000; padding: 8px 15px; border-radius: 10px; font-size: 14px; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; }

        .hero { text-align: center; padding: 40px 20px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); }
        .hero h2 { font-size: clamp(22px, 5vw, 36px); font-weight: 900; margin-bottom: 10px; }
        .hero h2 span { color: var(--primary); }
        .hero p { font-size: 14px; color: var(--text-muted); }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 0 15px 50px; }
        .store-layout { display: flex; gap: 20px; align-items: flex-start; flex-direction: column; }
        
        .sidebar-categories { width: 100%; display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .sidebar-categories::-webkit-scrollbar { display: none; }
        
        .cat-btn { background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border-color); padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        .cat-btn:hover { background: rgba(255,255,255,0.05); }
        .cat-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }

        .main-products { flex: 1; width: 100%; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        
        .product-card { background: var(--bg-card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); display: flex; flex-direction: column; position: relative; }
        .product-img-wrapper { height: 160px; background: #000; position: relative; display: flex; justify-content: center; align-items: center; padding: 10px;}
        .product-img-wrapper img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px;}
        
        .like-btn { position: absolute; top: 10px; left: 10px; background: rgba(0, 0, 0, 0.6); border: 1px solid var(--border-color); width: 30px; height: 30px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 14px; color: var(--text-muted); cursor: pointer; z-index: 10; }
        .like-btn.liked { color: var(--danger); border-color: var(--danger); }
        
        .product-info { padding: 15px; text-align: center; }
        .product-title { font-size: 14px; font-weight: 800; color: #fff; margin-bottom: 5px; }
        .product-price { font-size: 18px; font-weight: 900; color: var(--primary); margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .product-price span { font-size: 12px; color: var(--text-main); font-weight: 600; }
        
        .stock-warning { display: block; font-size: 12px; font-weight: bold; margin-bottom: 10px; min-height: 18px; }
        
        .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 14px; font-weight: 800; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-cart { background: var(--primary); color: #000; }
        .btn-cart:hover:not(:disabled) { background: var(--primary-hover); }
        .btn-cart:disabled { background: var(--border-color); color: var(--text-muted); cursor: not-allowed; }
        
        .btn-buy { background: var(--whatsapp); color: #fff; }
        .btn-delete { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .btn-edit { background: rgba(16, 185, 129, 0.1); color: var(--success); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(3px); z-index: 2000; display: none; opacity: 0; transition: 0.3s; }
        .overlay.active { display: block; opacity: 1; }
        
        .side-panel { position: fixed; top: 0; right: -100%; width: 350px; max-width: 100%; height: 100%; background: var(--bg-card); z-index: 2001; transition: 0.3s ease-in-out; display: flex; flex-direction: column; border-left: 1px solid var(--border-color); }
        .side-panel.active { right: 0; }
        
        .side-header { padding: 15px 20px; background: var(--bg-dark); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .side-items { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .cart-item { display: flex; gap: 10px; background: var(--bg-dark); padding: 10px; border-radius: 10px; border: 1px solid var(--border-color); align-items: center;}
        .cart-item img { width: 60px; height: 60px; border-radius: 8px; object-fit: contain; background: #000;}
        .cart-item-details { flex: 1; }
        .cart-item-title { font-weight: 800; font-size: 13px; color: var(--text-main); margin-bottom: 5px;}
        
        .qty-controls { display: flex; align-items: center; gap: 10px; margin-top: 5px; background: var(--bg-card); width: max-content; padding: 2px 5px; border-radius: 6px; }
        .qty-btn { background: transparent; border: none; color: var(--text-main); font-size: 16px; cursor: pointer; font-weight: bold; width: 20px;}
        .remove-item { color: var(--danger); cursor: pointer; border: none; background: transparent; font-size: 16px; }
        
        .side-footer { padding: 15px; background: var(--bg-dark); border-top: 1px solid var(--border-color); }
        
        .player-id-box { margin-bottom: 15px; }
        .player-id-box label { display: block; font-size: 12px; color: var(--primary); margin-bottom: 5px; font-weight: bold; }
        .player-id-box input { width: 100%; background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-main); padding: 10px; border-radius: 8px; outline: none; font-family: 'Cairo'; }

        /* منطقة الكوبون */
        .coupon-area { display: flex; gap: 10px; margin-bottom: 15px; }
        .coupon-area input { flex: 1; background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-main); padding: 8px; border-radius: 8px; outline: none; font-family: 'Cairo'; }
        .coupon-area button { background: var(--primary); color: #000; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Cairo';}
        .discount-text { color: var(--success); font-size: 12px; font-weight: bold; margin-bottom: 10px; text-align: right; display: block;}

        /* لوحة الإدارة */
        .admin-panel { background: var(--bg-dark); padding: 20px; border-radius: 15px; border: 1px solid var(--border-color); margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-weight: 700; color: var(--text-muted); font-size: 12px; }
        .input-group input, .input-group textarea, .input-group select { background: var(--bg-card); color: var(--text-main); padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; outline: none; font-family: 'Cairo'; }
        
        .admin-actions { display: flex; gap: 10px; margin-top: 10px;}
        
        #toast { visibility: hidden; min-width: 250px; background-color: var(--bg-dark); color: #fff; text-align: center; border-radius: 8px; padding: 12px; position: fixed; z-index: 10000; left: 50%; transform: translateX(-50%); bottom: 30px; font-size: 14px; font-weight: bold; border: 1px solid var(--primary); opacity: 0; transition: 0.3s; }
        #toast.show { visibility: visible; opacity: 1; }

        @media (max-width: 600px) {
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .product-img-wrapper { height: 130px; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-gamepad"></i> Kemo
        </div>
        
        <div class="nav-actions">
            <div class="icon-btn-wrapper">
                <button class="cart-icon-btn heart-icon" onclick="openSidebar('wishlist-sidebar')">
                    <i class="fa-solid fa-heart"></i>
                    <span class="cart-badge" id="wishlist-badge-count" style="background: var(--danger); color:white;">0</span>
                </button>
                <button class="cart-icon-btn" onclick="openSidebar('cart-sidebar')">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="cart-badge" id="cart-badge-count">0</span>
                </button>
            </div>
            
            <button id="btn-admin-nav" class="btn-admin-nav" onclick="switchTab('admin')">لوحة الإدارة</button>

            <div id="user-area" class="user-area">
                <button class="btn-google" onclick="loginWithGoogle()">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg"> تسجيل الدخول
                </button>
            </div>
        </div>
    </header>

    <div class="overlay" id="main-overlay" onclick="closeAllSidebars()"></div>

    <!-- سلة المشتريات -->
    <div class="side-panel" id="cart-sidebar">
        <div class="side-header">
            <h3><i class="fa-solid fa-basket-shopping" style="color:var(--primary)"></i> سلة الشحن</h3>
            <button class="close-side" onclick="closeAllSidebars()" style="background:transparent; border:none; color:var(--text-muted); font-size:22px; cursor:pointer;"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="side-items" id="cart-items"></div>
        <div class="side-footer">
            <div class="player-id-box">
                <label>رقم اللاعب (Player ID) / اسم الحساب</label>
                <input type="text" id="customer-game-id" placeholder="اكتب الـ ID هنا ليتم شحنه...">
            </div>
            
            <div class="coupon-area">
                <input type="text" id="coupon-input" placeholder="لديك كود خصم؟">
                <button onclick="applyCoupon()">تطبيق</button>
            </div>
            <span id="coupon-message" class="discount-text"></span>

            <div style="display: flex; justify-content: space-between; font-weight: 900; margin-bottom: 10px; font-size:16px;">
                <span>الإجمالي:</span>
                <span style="color: var(--primary);"><span id="cart-total-price" style="text-decoration:none;">0</span> ج.م</span>
            </div>
            <button class="btn btn-buy" onclick="checkoutWhatsApp()">
                <i class="fa-brands fa-whatsapp fa-lg"></i> إرسال الطلب عبر واتساب
            </button>
        </div>
    </div>

    <!-- المفضلة -->
    <div class="side-panel" id="wishlist-sidebar">
        <div class="side-header">
            <h3><i class="fa-solid fa-heart" style="color:var(--danger)"></i> المفضلة</h3>
            <button class="close-side" onclick="closeAllSidebars()" style="background:transparent; border:none; color:var(--text-muted); font-size:22px; cursor:pointer;"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="side-items" id="wishlist-items"></div>
    </div>

    <div id="store-section">
        <div class="hero">
            <h2>اشحن ألعابك <span>الآن!</span></h2>
            <p>أسرع خدمة شحن بأفضل الأسعار، جاري التوصيل فوراً بعد الطلب.</p>
        </div>
        
        <div class="container store-layout">
            <div class="sidebar-categories" id="store-category-filter">
                <button class="cat-btn active" onclick="filterCategory('all', this)">الكل</button>
            </div>

            <div class="main-products">
                <div class="products-grid" id="products-list">
                    <div style="text-align: center; width: 100%; grid-column: 1/-1;"><i class="fa-solid fa-circle-notch fa-spin"></i> جاري التحميل...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- قسم الإدارة -->
    <div id="admin-section" class="container" style="display: none; margin-top: 30px;">
        <button class="btn" style="background:var(--bg-card); color:var(--text-main); width:max-content; margin-bottom:20px; border:1px solid var(--border-color);" onclick="switchTab('store')">العودة للمتجر</button>

        <h3 style="margin-bottom:15px; color:var(--primary);"><i class="fa-solid fa-ticket"></i> نظام كوبونات الخصم</h3>
        <div class="admin-panel">
            <div class="form-grid">
                <div class="input-group"><label>كود الخصم (انجليزي)</label><input type="text" id="coupon-code" placeholder="مثال: KEMO10"></div>
                <div class="input-group"><label>نسبة الخصم (%)</label><input type="number" id="coupon-percent" placeholder="مثال: 10"></div>
                <div class="input-group"><label>الكمية المتاحة للكوبون</label><input type="number" id="coupon-uses" placeholder="عدد الأشخاص المسموح لهم"></div>
                <button class="btn btn-cart" style="grid-column: 1 / -1; margin-top:10px;" onclick="createCoupon()">إضافة الكوبون</button>
            </div>
            <div id="admin-coupons-list" style="margin-top:20px; display:flex; flex-wrap:wrap; gap:10px;"></div>
        </div>

        <h3 style="margin-bottom:15px; color:var(--primary);"><i class="fa-solid fa-plus"></i> إضافة / تعديل منتج</h3>
        <div class="admin-panel">
            <div class="form-grid">
                <div class="input-group">
                    <label>القسم</label>
                    <select id="p-category" onchange="checkNewCategory()"><option value="none">بدون قسم</option></select>
                    <input type="text" id="p-new-cat" placeholder="اسم القسم الجديد..." style="display:none; margin-top:5px;">
                </div>
                <div class="input-group"><label>الاسم (مثال: 210 جوهرة)</label><input type="text" id="p-name"></div>
                <div class="input-group"><label>السعر (ج.م)</label><input type="number" id="p-price"></div>
                <div class="input-group"><label>الكمية المتاحة (المخزون)</label><input type="number" id="p-stock" placeholder="اكتب 100 مثلاً"></div>
                <div class="input-group"><label>صورة المنتج (اتركه فارغ لتعديل البيانات فقط)</label><input type="file" id="p-image" accept="image/*"></div>
                <div class="input-group" style="grid-column: 1 / -1;">
                    <label>ملاحظة تظهر في رسالة الواتساب</label>
                    <input type="text" id="p-msg" placeholder="مثال: اشحنلي 210 جوهرة يا Kemo">
                </div>
                <div class="admin-actions" style="grid-column: 1 / -1;">
                    <button class="btn btn-cart" id="save-product-btn" onclick="saveProduct()">إضافة المنتج</button>
                    <button class="btn" id="cancel-edit-btn" style="background:var(--border-color); color:white; display:none;" onclick="cancelEdit()">إلغاء التعديل</button>
                </div>
            </div>
        </div>
        
        <h3 style="margin-bottom:15px; color:var(--text-main);"><i class="fa-solid fa-boxes-stacked"></i> إدارة المنتجات الحالية</h3>
        <div class="products-grid" id="admin-products-list"></div>
    </div>

    <div id="toast">رسالة تنبيه</div>

    <script>
        // === إعدادات Firebase الخاصة بك ===
        const firebaseConfig = {
            apiKey: "AIzaSyAxAGDNo9cRiYVjUopaiWo4K4ylUG8tiG0",
            authDomain: "kemo-store-daf94.firebaseapp.com",
            databaseURL: "https://kemo-store-daf94-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "kemo-store-daf94",
            storageBucket: "kemo-store-daf94.firebasestorage.app",
            messagingSenderId: "642183201870",
            appId: "1:642183201870:web:e0890b603e079f2438af1f"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        const ADMIN_EMAIL = "kareemammar2025@gmail.com".toLowerCase(); 
        const whatsappNumber = "201115168017";
        
        // المتغيرات
        let products =[], categories =[], coupons =[]; 
        let currentFilter = 'all'; 
        let cart = JSON.parse(localStorage.getItem('kemo_cart_gaming')) ||[];
        let likes = JSON.parse(localStorage.getItem('kemo_likes_gaming')) ||[];
        let uploadedImageData = "";
        let currentUser = null;
        let isAdmin = false;
        
        // التعديل والخصم
        let editingProductId = null;
        let appliedDiscountPercent = 0;
        let appliedCouponId = null;

        function showToast(msg, isError = false) {
            const t = document.getElementById("toast");
            t.innerHTML = msg;
            t.style.borderColor = isError ? "var(--danger)" : "var(--primary)";
            t.className = "show";
            setTimeout(() => t.className = t.className.replace("show", ""), 3000);
        }

        // --- جلب البيانات ---
        db.ref('kemo_categories').on('value', snap => { categories = snap.val() ||[]; renderCategoriesUI(); });
        db.ref('kemo_products').on('value', snap => { products = snap.val() ||[]; renderProducts(); renderCart(); updateWishlistBadge(); });
        db.ref('kemo_coupons').on('value', snap => { coupons = snap.val() ||[]; if(isAdmin) renderAdminCoupons(); });

        // --- تسجيل الدخول ---
        function loginWithGoogle() { auth.signInWithPopup(provider).then(()=>showToast("تم الدخول")).catch(e=>showToast(e.message, true)); }
        function logout() { auth.signOut().then(() => { showToast("تم الخروج"); switchTab('store'); }); }

        auth.onAuthStateChanged(user => {
            currentUser = user; 
            const userArea = document.getElementById('user-area');
            const btnAdminNav = document.getElementById('btn-admin-nav');
            if (user) {
                isAdmin = (user.email.toLowerCase() === ADMIN_EMAIL);
                let userName = user.displayName ? user.displayName.split(' ')[0] : 'مستخدم';
                userArea.innerHTML = `<div class="user-profile"><img src="${user.photoURL || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}"><span>${userName}</span><button class="btn-logout-small" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i></button></div>`;
                btnAdminNav.style.display = isAdmin ? 'inline-block' : 'none';
            } else {
                isAdmin = false;
                userArea.innerHTML = `<button class="btn-google" onclick="loginWithGoogle()"><img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg"> تسجيل الدخول</button>`;
                btnAdminNav.style.display = 'none';
            }
        });

        function openSidebar(id) { closeAllSidebars(); document.getElementById(id).classList.add('active'); document.getElementById('main-overlay').classList.add('active'); }
        function closeAllSidebars() { document.querySelectorAll('.side-panel').forEach(p=>p.classList.remove('active')); document.getElementById('main-overlay').classList.remove('active'); }

        // --- السلة ---
        function addToCart(id) {
            const p = products.find(x => x.id === id); if(!p) return;
            if(p.stock <= 0) return showToast("عذراً، لقد نفذت الكمية", true);

            const exist = cart.find(x => x.id === id);
            if(exist) {
                if(exist.qty >= p.stock) return showToast(`لا يوجد سوى ${p.stock} في المخزون`, true);
                exist.qty++;
            } else {
                cart.push({ id: p.id, name: p.name, price: p.price, image: p.image, waMessage: p.waMessage, qty: 1 });
            }
            saveCart(); showToast("أضيف للسلة");
        }
        function updateCartQty(id, ch) { 
            const it = cart.find(x=>x.id===id); 
            const p = products.find(x=>x.id===id);
            if(it && p){ 
                let newQty = it.qty + ch;
                if(newQty > p.stock) return showToast(`أقصى كمية متاحة هي ${p.stock}`, true);
                it.qty = newQty; 
                if(it.qty<=0) cart=cart.filter(x=>x.id!==id); 
                saveCart(); 
            } 
        }
        function removeFromCart(id) { cart = cart.filter(x=>x.id!==id); saveCart(); }
        function saveCart() { localStorage.setItem('kemo_cart_gaming', JSON.stringify(cart)); renderCart(); }

        // --- نظام الخصم (الكوبونات) ---
        function applyCoupon() {
            const code = document.getElementById('coupon-input').value.trim().toUpperCase();
            if(!code) { appliedDiscountPercent = 0; appliedCouponId = null; renderCart(); return; }
            
            const coupon = coupons.find(c => c.code === code);
            if(!coupon) return showToast("كوبون غير صحيح", true);
            if(coupon.uses <= 0) return showToast("تم استهلاك هذا الكوبون بالكامل", true);

            appliedDiscountPercent = coupon.percent;
            appliedCouponId = coupon.id;
            document.getElementById('coupon-message').innerText = `تم تطبيق خصم ${appliedDiscountPercent}% بنجاح! 🎉`;
            renderCart();
        }

        function createCoupon() {
            if(!isAdmin) return;
            const code = document.getElementById('coupon-code').value.trim().toUpperCase();
            const percent = parseInt(document.getElementById('coupon-percent').value);
            const uses = parseInt(document.getElementById('coupon-uses').value);

            if(!code || !percent || !uses) return showToast("أكمل بيانات الكوبون", true);
            
            const newCoupon = { id: Date.now(), code: code, percent: percent, uses: uses };
            db.ref('kemo_coupons').set([...coupons, newCoupon]).then(()=>{
                showToast("تم إنشاء الكوبون");
                document.getElementById('coupon-code').value=''; document.getElementById('coupon-percent').value=''; document.getElementById('coupon-uses').value='';
            });
        }

        function deleteCoupon(id) { if(isAdmin) db.ref('kemo_coupons').set(coupons.filter(c=>c.id!==id)); }

        function renderAdminCoupons() {
            const cont = document.getElementById('admin-coupons-list'); cont.innerHTML='';
            coupons.forEach(c => {
                cont.innerHTML += `<div style="background:var(--bg-card); padding:10px; border-radius:8px; border:1px dashed var(--accent); font-size:13px;">
                    <b>${c.code}</b> | خصم: ${c.percent}% | المتبقي: ${c.uses} شخص 
                    <i class="fa-solid fa-trash" style="color:var(--danger); cursor:pointer; margin-right:10px;" onclick="deleteCoupon(${c.id})"></i>
                </div>`;
            });
        }

        function renderCart() {
            const cont = document.getElementById('cart-items'); let subTotal = 0, cnt = 0; cont.innerHTML = '';
            if(!cart.length) cont.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-muted);">السلة فارغة</div>';
            else cart.forEach(it => {
                subTotal += (it.price * it.qty); cnt += it.qty;
                cont.innerHTML += `
                    <div class="cart-item">
                        <img src="${it.image}">
                        <div class="cart-item-details">
                            <div class="cart-item-title">${it.name}</div>
                            <div style="color:var(--primary); font-weight:bold; font-size:13px;">${it.price * it.qty} ج.م</div>
                            <div class="qty-controls">
                                <button class="qty-btn" onclick="updateCartQty(${it.id}, -1)">-</button>
                                <span>${it.qty}</span>
                                <button class="qty-btn" onclick="updateCartQty(${it.id}, 1)">+</button>
                            </div>
                        </div>
                        <button class="remove-item" onclick="removeFromCart(${it.id})"><i class="fa-solid fa-trash"></i></button>
                    </div>`;
            });

            let finalTotal = subTotal;
            if(appliedDiscountPercent > 0) {
                let discountAmount = (subTotal * appliedDiscountPercent) / 100;
                finalTotal = Math.floor(subTotal - discountAmount);
                document.getElementById('cart-total-price').innerHTML = `<span style="text-decoration:line-through; color:var(--text-muted); font-size:14px; margin-left:5px;">${subTotal}</span> ${finalTotal}`;
            } else {
                document.getElementById('cart-total-price').innerText = finalTotal;
                document.getElementById('coupon-message').innerText = '';
            }
            
            document.getElementById('cart-badge-count').innerText = cnt;
        }

        // --- المفضلة ---
        function toggleLike(id) {
            if(likes.includes(id)) likes = likes.filter(l=>l!==id); else { likes.push(id); showToast("أضيف للمفضلة"); }
            localStorage.setItem('kemo_likes_gaming', JSON.stringify(likes)); renderProducts(); updateWishlistBadge(); renderWishlist();
        }
        function updateWishlistBadge() { document.getElementById('wishlist-badge-count').innerText = likes.length; }
        function renderWishlist() {
            const cont = document.getElementById('wishlist-items'); cont.innerHTML = '';
            if(!likes.length) cont.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-muted);">لا توجد مفضلة</div>';
            else likes.forEach(id => {
                const p = products.find(x=>x.id===id); if(p) cont.innerHTML += `
                    <div class="cart-item">
                        <img src="${p.image}">
                        <div class="cart-item-details"><div class="cart-item-title">${p.name}</div><div style="color:var(--primary); font-weight:bold; font-size:13px;">${p.price} ج.م</div></div>
                        <button class="btn btn-cart" style="width:auto; padding:5px 10px;" onclick="addToCart(${p.id})"><i class="fa-solid fa-plus"></i></button>
                        <button class="remove-item" onclick="toggleLike(${p.id})"><i class="fa-solid fa-trash"></i></button>
                    </div>`;
            });
        }

        // --- رسالة الواتساب المنسقة ---
        function checkoutWhatsApp() {
            if (!currentUser) { showToast("يرجى تسجيل الدخول أولاً!", true); loginWithGoogle(); return; }
            if (cart.length === 0) return showToast("السلة فارغة!", true);
            const playerId = document.getElementById('customer-game-id').value.trim();
            if (!playerId) return showToast("يجب كتابة الـ ID أو الحساب!", true);

            let subTotal = 0;
            let finalTotal = 0;

            // 1. حساب السعر النهائي
            cart.forEach(item => subTotal += (item.price * item.qty));
            finalTotal = subTotal;
            if(appliedDiscountPercent > 0) {
                finalTotal = Math.floor(subTotal - ((subTotal * appliedDiscountPercent) / 100));
            }

            // 2. تجهيز نص الواتساب حسب القالب المطلوب
            let msg = `مرحباً Kemo Store 👋\nأريد شحن المنتجات التالية:\n\n`;
            
            let userName = currentUser.displayName || 'عميل';
            let userEmail = currentUser.email || 'غير متوفر';
            
            msg += `👤 *معلومات المشتري:*\nالاسم: ${userName}\nالإيميل: ${userEmail}\n\n`;
            
            msg += `🎮 *معلومات اللعبة:*\nالـ ID / الحساب: *${playerId}*\n\n`;
            
            msg += `📦 *تفاصيل الشحنة:*\n`;
            cart.forEach((item, index) => {
                msg += `${index + 1}- *${item.name}*\n`;
                msg += `الكمية: ${item.qty} | السعر: ${item.price * item.qty} ج.م\n`;
                if(item.waMessage) msg += `💬: ${item.waMessage}\n`;
                msg += `\n`; // مسافة بين المنتجات
            });
            
            if(appliedDiscountPercent > 0) {
                msg += `🎟️ *تم تطبيق كوبون خصم:* ${appliedDiscountPercent}%\n`;
            }

            msg += `💰 *الإجمالي:* ${finalTotal} ج.م\n\n`;
            msg += `برجاء تأكيد الشحن معي.`;

            // 3. خصم الكوبون من الداتا بيز (لو استخدمه)
            if(appliedCouponId && appliedDiscountPercent > 0) {
                let cpIndex = coupons.findIndex(c => c.id === appliedCouponId);
                if(cpIndex !== -1) {
                    coupons[cpIndex].uses -= 1;
                    if(coupons[cpIndex].uses <= 0) coupons.splice(cpIndex, 1);
                    db.ref('kemo_coupons').set(coupons);
                }
            }

            // 4. خصم الكمية (المخزون) من المنتجات
            let updatedProducts = [...products];
            cart.forEach(cartItem => {
                let pIndex = updatedProducts.findIndex(p => p.id === cartItem.id);
                if(pIndex !== -1) {
                    updatedProducts[pIndex].stock = Math.max(0, updatedProducts[pIndex].stock - cartItem.qty);
                }
            });
            db.ref('kemo_products').set(updatedProducts);

            // 5. فتح الواتساب ومسح السلة
            cart =[]; saveCart(); closeAllSidebars();
            appliedDiscountPercent = 0; appliedCouponId = null;
            document.getElementById('coupon-input').value = '';
            
            showToast("جاري تحويلك للواتساب...");
            window.open(`https://wa.me/${whatsappNumber}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // --- إدارة المنتجات (إضافة وتعديل) ---
        function checkNewCategory() {
            const v = document.getElementById('p-category').value;
            document.getElementById('p-new-cat').style.display = v === '__NEW__' ? 'block' : 'none';
        }

        function renderCategoriesUI() {
            let catHtml = `<option value="none">الكل / بدون قسم</option>`;
            categories.forEach(c => catHtml += `<option value="${c.name}">${c.name}</option>`);
            catHtml += `<option value="__NEW__" style="color:var(--primary);">➕ إضافة قسم جديد...</option>`;
            document.getElementById('p-category').innerHTML = catHtml;
            
            let filterHtml = `<button class="cat-btn ${currentFilter === 'all' ? 'active' : ''}" onclick="filterCategory('all', this)">الكل</button>`;
            categories.forEach(c => filterHtml += `<button class="cat-btn ${currentFilter === c.name ? 'active' : ''}" onclick="filterCategory('${c.name}', this)">${c.name}</button>`);
            document.getElementById('store-category-filter').innerHTML = filterHtml;
        }

        function filterCategory(cat, btn) {
            currentFilter = cat; document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderProducts();
        }

        document.getElementById('p-image').addEventListener('change', function(e) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas'); const MAX = 500; let w = img.width, h = img.height;
                    if(w > h) { if(w > MAX) { h *= MAX / w; w = MAX; } } else { if(h > MAX) { w *= MAX / h; h = MAX; } }
                    canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    uploadedImageData = canvas.toDataURL('image/jpeg', 0.6); 
                }; img.src = ev.target.result;
            }; reader.readAsDataURL(file);
        });

        function editProduct(id) {
            const p = products.find(x => x.id === id); if(!p) return;
            editingProductId = p.id;
            
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-stock').value = p.stock || 0;
            document.getElementById('p-msg').value = p.waMessage || '';
            document.getElementById('p-category').value = p.category || 'none';
            uploadedImageData = p.image; // نحتفظ بالصورة القديمة لو مرفعش جديدة
            
            document.getElementById('save-product-btn').innerText = "تحديث بيانات المنتج";
            document.getElementById('cancel-edit-btn').style.display = "inline-block";
            window.scrollTo({ top: document.getElementById('admin-section').offsetTop, behavior: 'smooth' });
        }

        function cancelEdit() {
            editingProductId = null;
            uploadedImageData = "";['p-name', 'p-price', 'p-stock', 'p-image', 'p-msg', 'p-new-cat'].forEach(id=>document.getElementById(id).value='');
            document.getElementById('p-category').value = 'none';
            document.getElementById('save-product-btn').innerText = "إضافة المنتج";
            document.getElementById('cancel-edit-btn').style.display = "none";
        }

        function saveProduct() {
            if(!isAdmin) return;
            let cat = document.getElementById('p-category').value;
            const newCat = document.getElementById('p-new-cat').value.trim();
            const name = document.getElementById('p-name').value; 
            const price = parseInt(document.getElementById('p-price').value); 
            const stock = parseInt(document.getElementById('p-stock').value) || 0; 
            const msg = document.getElementById('p-msg').value;
            
            if(cat === '__NEW__') {
                if(!newCat) return showToast("اكتب اسم القسم", true);
                cat = newCat; db.ref('kemo_categories').set([...categories, { id: Date.now().toString(), name: newCat }]);
            }
            if(!name || !price || !uploadedImageData) return showToast("الاسم، السعر، والصورة مطلوبين!", true);
            
            const btn = document.getElementById('save-product-btn'); btn.innerText = 'جاري الحفظ...'; btn.disabled = true;
            
            let updatedProducts = [...products];
            
            if(editingProductId) {
                // وضع التعديل
                let index = updatedProducts.findIndex(p => p.id === editingProductId);
                if(index !== -1) {
                    updatedProducts[index] = { id: editingProductId, category: cat, image: uploadedImageData, name: name, price: price, stock: stock, waMessage: msg };
                }
            } else {
                // وضع إضافة جديد
                const newP = { id: Date.now(), category: cat, image: uploadedImageData, name: name, price: price, stock: stock, waMessage: msg };
                updatedProducts.push(newP);
            }

            db.ref('kemo_products').set(updatedProducts).then(() => {
                showToast(editingProductId ? "تم التحديث بنجاح" : "تم إضافة المنتج");
                cancelEdit(); btn.disabled = false;
            });
        }

        function deleteProduct(id) { if(isAdmin && confirm("حذف المنتج بشكل نهائي؟")) db.ref('kemo_products').set(products.filter(p=>p.id!==id)).then(()=>showToast("تم الحذف")); }

        function switchTab(t) { document.getElementById('store-section').style.display = t==='store'?'block':'none'; document.getElementById('admin-section').style.display = t==='admin'?'block':'none'; }

        function renderProducts() {
            const store = document.getElementById('products-list'), admin = document.getElementById('admin-products-list');
            store.innerHTML = ''; admin.innerHTML = '';
            
            let list = currentFilter === 'all' ? products : products.filter(p=>p.category === currentFilter);
            
            if(!list.length) store.innerHTML = `<div style="text-align:center; grid-column:1/-1; padding:40px; color:var(--text-muted);">لا توجد منتجات هنا حالياً.</div>`;
            else [...list].reverse().forEach(p => {
                const liked = likes.includes(p.id);
                let stockQuantity = p.stock || 0;
                
                // رسائل المخزون
                let stockWarningHtml = '';
                let btnHtml = '';
                
                if(stockQuantity <= 0) {
                    stockWarningHtml = `<span class="stock-warning" style="color:var(--danger);">نفذت الكمية</span>`;
                    btnHtml = `<button class="btn btn-cart" disabled><i class="fa-solid fa-ban"></i> غير متوفر</button>`;
                } else if(stockQuantity < 10) {
                    stockWarningHtml = `<span class="stock-warning" style="color:var(--danger);">⚠️ قربت تخلص الكمية (باقي ${stockQuantity})</span>`;
                    btnHtml = `<button class="btn btn-cart" onclick="addToCart(${p.id})">شحن الآن</button>`;
                } else {
                    stockWarningHtml = `<span class="stock-warning"></span>`;
                    btnHtml = `<button class="btn btn-cart" onclick="addToCart(${p.id})">شحن الآن</button>`;
                }

                store.innerHTML += `
                    <div class="product-card">
                        <div class="product-img-wrapper">
                            <button class="like-btn ${liked?'liked':''}" onclick="toggleLike(${p.id})"><i class="${liked?'fa-solid':'fa-regular'} fa-heart"></i></button>
                            <img src="${p.image}">
                        </div>
                        <div class="product-info">
                            <div class="product-title">${p.name}</div>
                            <div class="product-price">${p.price} <span>ج.م</span></div>
                            ${stockWarningHtml}
                            ${btnHtml}
                        </div>
                    </div>`;
            });

            if(products.length) [...products].reverse().forEach(p => {
                admin.innerHTML += `
                    <div class="product-card" style="border-color:var(--border-color);">
                        <div class="product-img-wrapper"><img src="${p.image}"></div>
                        <div class="product-info">
                            <div class="product-title">${p.name}</div>
                            <div style="font-size:12px; color:var(--text-muted); margin-bottom:10px;">المخزون: <b style="color:var(--primary);">${p.stock||0}</b></div>
                            <div style="display:flex; gap:10px;">
                                <button class="btn btn-edit" onclick="editProduct(${p.id})"><i class="fa-solid fa-pen"></i></button>
                                <button class="btn btn-delete" onclick="deleteProduct(${p.id})"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
