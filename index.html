<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kemo Store | شحن ألعاب</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

    <style>
        :root { 
            --bg-dark: #0B0F19; --bg-card: #1A2235; --primary: #F59E0B; --primary-hover: #D97706; 
            --accent: #8B5CF6; --text-main: #F3F4F6; --text-muted: #9CA3AF; --danger: #EF4444; 
            --whatsapp: #25D366; --border-color: #374151;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }
        
        header { background: rgba(26, 34, 53, 0.95); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 26px; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 8px; text-shadow: 0 0 10px rgba(245, 158, 11, 0.3); }
        
        .nav-actions { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .icon-btn-wrapper { display: flex; gap: 10px; }
        .cart-icon-btn { background: var(--bg-card); border: 1px solid var(--border-color); width: 45px; height: 45px; border-radius: 12px; font-size: 20px; color: var(--text-main); cursor: pointer; position: relative; transition: 0.3s; display: flex; justify-content: center; align-items: center; }
        .cart-icon-btn:hover { border-color: var(--primary); color: var(--primary); }
        .cart-icon-btn.heart-icon:hover { border-color: var(--danger); color: var(--danger); }
        .cart-badge { position: absolute; top: -5px; right: -5px; background: var(--primary); color: #000; font-size: 11px; font-weight: 900; width: 20px; height: 20px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 2px solid var(--bg-card); }

        .btn-auth { background: var(--primary); border: none; color: #000; padding: 10px 18px; border-radius: 12px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-auth:hover { background: var(--primary-hover); transform: translateY(-2px); }
        
        /* المستخدم والقائمة */
        .user-dropdown { position: relative; display: inline-block; }
        .user-profile { display: flex; align-items: center; gap: 8px; background: var(--bg-dark); padding: 5px 15px 5px 5px; border-radius: 30px; border: 1px solid var(--border-color); cursor: pointer; transition: 0.3s; }
        .user-profile img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
        .user-profile span { font-weight: 700; font-size: 14px; }
        .user-menu { display: none; position: absolute; left: 0; top: 50px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; width: 180px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); overflow: hidden; z-index: 1001; }
        .user-dropdown:hover .user-menu { display: block; }
        .user-menu button { width: 100%; text-align: right; background: none; border: none; padding: 12px 15px; color: var(--text-main); font-size: 14px; font-weight: 700; cursor: pointer; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .user-menu button:hover { background: rgba(255,255,255,0.05); color: var(--primary); }
        .user-menu button.logout { color: var(--danger); }

        /* نافذة الدخول (تم تعديل زر جوجل فيها) */
        .auth-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 3000; display: none; justify-content: center; align-items: center; }
        .auth-modal { background: var(--bg-card); width: 90%; max-width: 400px; border-radius: 20px; border: 1px solid var(--border-color); overflow: hidden; position: relative; }
        .auth-header { display: flex; }
        .auth-tab { flex: 1; padding: 15px; text-align: center; font-weight: 800; font-size: 16px; cursor: pointer; background: rgba(0,0,0,0.2); color: var(--text-muted); border-bottom: 2px solid var(--border-color); transition: 0.3s; }
        .auth-tab.active { background: transparent; color: var(--primary); border-bottom-color: var(--primary); }
        .auth-body { padding: 30px 20px; }
        .auth-input { width: 100%; background: var(--bg-dark); border: 1px solid var(--border-color); color: var(--text-main); padding: 12px; border-radius: 12px; margin-bottom: 15px; outline: none; font-family: 'Cairo'; }
        .auth-input:focus { border-color: var(--primary); }
        .auth-btn { width: 100%; background: var(--primary); border: none; padding: 12px; border-radius: 12px; font-weight: 800; font-size: 16px; color: #000; cursor: pointer; margin-bottom: 15px; transition: 0.3s;}
        
        /* التعديل الجديد لزر جوجل */
        .google-auth-btn { width: 100%; background: #ffffff; border: 1px solid #ccc; padding: 12px; border-radius: 12px; font-weight: 800; font-size: 15px; color: #333; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .google-auth-btn:hover { background: #f8f9fa; transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        
        .close-auth { position: absolute; top: 15px; right: 15px; background: transparent; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; }

        /* نافذة الطلبات السابقة */
        .orders-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; display: none; justify-content: center; align-items: center; }
        .orders-modal { background: var(--bg-card); width: 95%; max-width: 600px; height: 80vh; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; }
        .orders-header { padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .orders-body { flex: 1; overflow-y: auto; padding: 20px; }
        .order-card { background: var(--bg-dark); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .order-card-header { display: flex; justify-content: space-between; border-bottom: 1px dashed var(--border-color); padding-bottom: 10px; margin-bottom: 10px; }
        .order-id { color: var(--primary); font-weight: bold; }
        
        .hero { background: linear-gradient(135deg, rgba(26,34,53,1) 0%, rgba(11,15,25,1) 100%); color: var(--text-main); text-align: center; padding: 40px 20px; border-radius: 0 0 30px 30px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hero h2 { font-size: clamp(24px, 5vw, 42px); margin-bottom: 10px; }
        .hero h2 span { color: var(--primary); }
        
        .container { max-width: 1300px; margin: 0 auto; padding: 0 15px 50px; }
        .store-layout { display: flex; gap: 25px; align-items: flex-start; }
        .sidebar-categories { width: 280px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; padding: 20px; position: sticky; top: 100px; display: flex; flex-direction: column; gap: 10px; }
        .cat-btn { background: transparent; color: var(--text-muted); border: none; padding: 12px 15px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; text-align: right; width: 100%; }
        .cat-btn.active { background: var(--primary); color: #000; }

        .main-products { flex: 1; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        
        .product-card { background: var(--bg-card); border-radius: 20px; overflow: hidden; border: 1px solid var(--border-color); transition: 0.3s ease; position: relative; display: flex; flex-direction: column; }
        .product-img-wrapper { height: 200px; overflow: hidden; position: relative; background: #000; }
        .product-img-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s ease; opacity: 0.9; }
        
        /* زر المفضلة (القلب) على المنتجات */
        .like-btn { position: absolute; top: 12px; left: 12px; background: rgba(11, 15, 25, 0.8); border: 1px solid var(--border-color); width: 35px; height: 35px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 16px; color: var(--text-muted); cursor: pointer; transition: 0.3s; z-index: 10; backdrop-filter: blur(5px);}
        .like-btn.liked { color: var(--danger); border-color: var(--danger); animation: heartBeat 0.3s; }
        @keyframes heartBeat { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

        .stock-warning { color: var(--danger); font-size: 12px; font-weight: 900; margin-bottom: 5px; animation: flash 1s infinite alternate; }
        @keyframes flash { 0% { opacity: 0.7; } 100% { opacity: 1; } }

        .product-info { padding: 15px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .product-title { font-size: 16px; font-weight: 800; margin-bottom: 5px; color: var(--text-main); }
        .product-price { font-size: 22px; font-weight: 900; color: var(--primary); margin-bottom: 10px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 12px; font-size: 15px; font-weight: 800; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-cart { background: var(--primary); color: #000; }
        .btn-buy { background: var(--whatsapp); color: #fff; }
        .btn-delete { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

        /* القوائم الجانبية (للسلة والمفضلة) */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; display: none; }
        .overlay.active { display: block; }
        .side-panel { position: fixed; top: 0; right: -450px; width: 400px; max-width: 100%; height: 100%; background: var(--bg-card); z-index: 2001; transition: 0.4s; display: flex; flex-direction: column; }
        .side-panel.active { right: 0; }
        .side-header { padding: 20px; background: rgba(11,15,25,0.8); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; }
        .close-side { background: none; border: none; font-size: 24px; color: var(--text-muted); cursor: pointer; }
        .side-items { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .player-id-box { background: var(--bg-dark); border: 1px solid var(--accent); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .player-id-box input { width: 100%; background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-main); padding: 10px; border-radius: 8px; outline: none; margin-top: 5px; }

        .admin-panel { background: var(--bg-card); padding: 20px; border-radius: 15px; border: 1px solid var(--border-color); margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group input, .input-group select, .input-group textarea { background: var(--bg-dark); color: white; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; outline: none; }
        
        #toast { visibility: hidden; min-width: 250px; background: var(--bg-card); color: #fff; text-align: center; border-radius: 10px; padding: 15px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10000; border: 1px solid var(--border-color); opacity: 0; transition: 0.3s; }
        #toast.show { visibility: visible; opacity: 1; }

        @media (max-width: 900px) {
            .store-layout { flex-direction: column; gap: 15px; }
            .sidebar-categories { width: 100%; flex-direction: row; overflow-x: auto; position: static; padding: 10px; }
            .form-grid { grid-template-columns: 1fr; }
            .side-panel { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fa-solid fa-gamepad"></i> Kemo Store</div>
        <div class="nav-actions">
            <div class="icon-btn-wrapper">
                <!-- زر المفضلة رجع تاني هنا -->
                <button class="cart-icon-btn heart-icon" onclick="openWishlist()">
                    <i class="fa-solid fa-heart"></i>
                    <span class="cart-badge" id="wishlist-badge-count" style="background: var(--danger); color:white;">0</span>
                </button>
                <button class="cart-icon-btn" onclick="openCart()">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="cart-badge" id="cart-badge-count">0</span>
                </button>
            </div>
            
            <div id="user-area" class="user-area">
                <button class="btn-auth" onclick="openAuthModal('login')">
                    <i class="fa-solid fa-user"></i> دخول / حساب جديد
                </button>
            </div>
        </div>
    </header>

    <!-- نافذة تسجيل الدخول -->
    <div class="auth-modal-overlay" id="auth-modal">
        <div class="auth-modal">
            <button class="close-auth" onclick="closeAuthModal()"><i class="fa-solid fa-xmark"></i></button>
            <div class="auth-header">
                <div class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">تسجيل الدخول</div>
                <div class="auth-tab" id="tab-signup" onclick="switchAuthTab('signup')">حساب جديد</div>
            </div>
            <div class="auth-body">
                <div id="form-signup" style="display: none;">
                    <input type="text" id="reg-name" class="auth-input" placeholder="اسمك الكريم (للطلب)">
                    <input type="email" id="reg-email" class="auth-input" placeholder="البريد الإلكتروني">
                    <input type="password" id="reg-pass" class="auth-input" placeholder="كلمة المرور (6 أحرف على الأقل)">
                    <button class="auth-btn" onclick="signUpWithEmail()">إنشاء حساب</button>
                </div>

                <div id="form-login">
                    <input type="email" id="log-email" class="auth-input" placeholder="البريد الإلكتروني">
                    <input type="password" id="log-pass" class="auth-input" placeholder="كلمة المرور">
                    <button class="auth-btn" onclick="loginWithEmail()">دخول</button>
                </div>

                <div style="text-align: center; margin: 15px 0; color: var(--text-muted);">أو</div>
                <!-- تصميم زر جوجل الجديد -->
                <button class="google-auth-btn" onclick="loginWithGoogle()">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="G" style="width:20px;"> 
                    المتابعة باستخدام جوجل
                </button>
            </div>
        </div>
    </div>

    <!-- نافذة مشترياتي -->
    <div class="orders-modal-overlay" id="orders-modal">
        <div class="orders-modal">
            <div class="orders-header">
                <h3><i class="fa-solid fa-clock-rotate-left" style="color:var(--primary)"></i> طلباتي السابقة</h3>
                <button class="close-auth" style="position:static;" onclick="closeOrdersModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="orders-body" id="orders-list-container"></div>
        </div>
    </div>

    <div class="overlay" id="main-overlay" onclick="closeAllSidebars()"></div>

    <!-- سلة المشتريات -->
    <div class="side-panel" id="cart-sidebar">
        <div class="side-header">
            <h3><i class="fa-solid fa-basket-shopping" style="color:var(--primary)"></i> سلة الشحن</h3>
            <button class="close-side" onclick="closeAllSidebars()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="side-items" id="cart-items"></div>
        <div class="side-footer">
            <div class="player-id-box">
                <label><i class="fa-solid fa-id-card"></i> رقم اللاعب (ID) / اسم الحساب</label>
                <input type="text" id="customer-game-id" placeholder="اكتب الـ ID هنا ليتم شحنه...">
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 18px; font-weight: 900; margin-bottom: 15px;">
                <span>الإجمالي:</span>
                <span style="color: var(--primary);"><span id="cart-total-price">0</span> ج.م</span>
            </div>
            <button class="btn btn-buy" onclick="checkoutWhatsApp()"><i class="fa-brands fa-whatsapp fa-lg"></i> إرسال الطلب</button>
        </div>
    </div>

    <!-- قائمة المفضلة الجانبية -->
    <div class="side-panel" id="wishlist-sidebar">
        <div class="side-header">
            <h3><i class="fa-solid fa-heart" style="color:var(--danger)"></i> المفضلة</h3>
            <button class="close-side" onclick="closeAllSidebars()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="side-items" id="wishlist-items"></div>
    </div>

    <div id="store-section">
        <div class="hero">
            <h2>اشحن ألعابك المفضلة <span>الآن!</span></h2>
            <p>أسرع خدمة شحن بأفضل الأسعار</p>
        </div>
        <div class="container store-layout">
            <div class="sidebar-categories" id="store-category-filter">
                <button class="cat-btn active" onclick="filterCategory('all', this)"><i class="fa-solid fa-border-all"></i> الكل</button>
            </div>
            <div class="main-products">
                <div class="products-grid" id="products-list"></div>
            </div>
        </div>
    </div>

    <div id="admin-section" class="container" style="display: none; margin-top: 30px;">
        <button class="btn" style="background:var(--bg-card); color:white; width:max-content; margin-bottom:20px;" onclick="switchTab('store')"><i class="fa-solid fa-arrow-right"></i> العودة للمتجر</button>

        <h2 style="margin-bottom:15px; color:var(--primary);">إضافة منتج جديد</h2>
        <div class="admin-panel form-grid">
            <div class="input-group">
                <label>اختر القسم</label>
                <select id="p-category" onchange="checkNewCategory()"><option value="none">بدون قسم</option></select>
                <input type="text" id="p-new-cat" placeholder="اسم القسم الجديد..." style="display:none; margin-top:5px;">
            </div>
            <div class="input-group"><label>اسم الشحنة</label><input type="text" id="p-name"></div>
            <div class="input-group"><label>السعر (ج.م)</label><input type="number" id="p-price"></div>
            <div class="input-group"><label>الكمية المتاحة للبيع</label><input type="number" id="p-qty"></div>
            <div class="input-group"><label>الصورة</label><input type="file" id="p-image" accept="image/*"></div>
            <div class="input-group" style="grid-column: 1 / -1;"><label>رسالة الواتس (اختياري)</label><input type="text" id="p-msg"></div>
            <button class="btn btn-cart" id="add-btn" style="grid-column: 1 / -1;" onclick="addProduct()"><i class="fa-solid fa-upload"></i> حفظ المنتج</button>
        </div>
        
        <h2 style="margin-bottom:15px; color:var(--primary);">إدارة المنتجات والأقسام</h2>
        <div class="admin-panel" id="admin-categories-list" style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px;"></div>
        <div class="products-grid" id="admin-products-list"></div>
    </div>

    <div id="toast">تم بنجاح!</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAxAGDNo9cRiYVjUopaiWo4K4ylUG8tiG0",
            authDomain: "kemo-store-daf94.firebaseapp.com",
            databaseURL: "https://kemo-store-daf94-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "kemo-store-daf94",
            storageBucket: "kemo-store-daf94.firebasestorage.app",
            messagingSenderId: "642183201870",
            appId: "1:642183201870:web:e0890b603e079f2438af1f"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        const ADMIN_EMAIL = "kareemammar2025@gmail.com".toLowerCase(); 
        const whatsappNumber = "201115168017";
        
        let products =[]; let categories =[]; let currentFilter = 'all'; 
        let cart = JSON.parse(localStorage.getItem('kemo_cart_gaming')) ||[];
        let likes = JSON.parse(localStorage.getItem('kemo_likes_gaming')) ||[]; // حفظ المفضلة
        let uploadedImageData = ""; let currentUser = null; let isAdmin = false;

        function showToast(msg, isError = false) {
            const t = document.getElementById("toast"); t.innerText = msg;
            t.style.borderColor = isError ? "var(--danger)" : "var(--whatsapp)";
            t.className = "show"; setTimeout(() => t.className = "", 3000);
        }

        function openAuthModal(type) { document.getElementById('auth-modal').style.display = 'flex'; switchAuthTab(type); }
        function closeAuthModal() { document.getElementById('auth-modal').style.display = 'none'; }
        function switchAuthTab(type) {
            document.getElementById('tab-login').classList.remove('active'); document.getElementById('tab-signup').classList.remove('active');
            document.getElementById('form-login').style.display = 'none'; document.getElementById('form-signup').style.display = 'none';
            document.getElementById(`tab-${type}`).classList.add('active'); document.getElementById(`form-${type}`).style.display = 'block';
        }

        function signUpWithEmail() {
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-pass').value;
            if(!name || !email || !pass) return showToast("أكمل جميع البيانات!", true);
            if(pass.length < 6) return showToast("الباسورد 6 أحرف على الأقل", true);

            auth.createUserWithEmailAndPassword(email, pass).then((userCred) => {
                userCred.user.updateProfile({ displayName: name }).then(() => { closeAuthModal(); showToast("تم إنشاء الحساب بنجاح!"); });
            }).catch((err) => {
                if(err.code === 'auth/email-already-in-use') showToast("الإيميل مسجل مسبقاً", true); else showToast(err.message, true);
            });
        }

        function loginWithEmail() {
            const email = document.getElementById('log-email').value.trim();
            const pass = document.getElementById('log-pass').value;
            if(!email || !pass) return showToast("أدخل الإيميل والباسورد", true);

            auth.signInWithEmailAndPassword(email, pass).then(() => { closeAuthModal(); showToast("أهلاً بك مرة أخرى!");
            }).catch((err) => {
                if(err.code === 'auth/user-not-found') showToast("الإيميل غير مسجل", true); else showToast("الباسورد خطأ", true);
            });
        }

        // تسجيل الدخول بجوجل مع رسالة الخطأ المبرمجة
        function loginWithGoogle() { 
            auth.signInWithPopup(provider).then(() => { 
                closeAuthModal(); showToast("تم الدخول بنجاح"); 
            }).catch(e => {
                // رسالة واضحة في حالة رفض جوجل
                alert("لم يتم تسجيل الدخول.\nالسبب: رابط موقعك غير مسجل في Firebase (Authorized domains).\nيرجى إضافة الرابط من إعدادات Firebase.");
                showToast("خطأ في تسجيل الدخول", true);
            }); 
        }
        
        function logout() { auth.signOut().then(() => { showToast("تم الخروج"); switchTab('store'); }); }

        auth.onAuthStateChanged((user) => {
            const userArea = document.getElementById('user-area');
            if (user) {
                currentUser = user; isAdmin = (user.email.toLowerCase() === ADMIN_EMAIL);
                const name = user.displayName || "عميل";
                const avatar = user.photoURL ? `<img src="${user.photoURL}">` : `<div style="width:35px;height:35px;border-radius:50%;background:var(--primary);color:#000;display:flex;justify-content:center;align-items:center;font-weight:bold;">${name.charAt(0)}</div>`;
                userArea.innerHTML = `<div class="user-dropdown"><div class="user-profile">${avatar} <span>${name.split(' ')[0]}</span></div><div class="user-menu">${isAdmin ? `<button onclick="switchTab('admin')"><i class="fa-solid fa-shield"></i> الإدارة</button>` : ''}<button onclick="openOrdersModal()"><i class="fa-solid fa-box"></i> مشترياتي</button><button class="logout" onclick="logout()"><i class="fa-solid fa-door-open"></i> خروج</button></div></div>`;
            } else {
                currentUser = null; isAdmin = false;
                userArea.innerHTML = `<button class="btn-auth" onclick="openAuthModal('login')"><i class="fa-solid fa-user"></i> دخول / حساب جديد</button>`;
            }
        });

        // ================= الأقسام =================
        db.ref('kemo_categories').on('value', (s) => { categories = s.val() ||[]; renderCategoriesUI(); });
        function checkNewCategory() { document.getElementById('p-new-cat').style.display = document.getElementById('p-category').value === '__NEW__' ? 'block' : 'none'; }
        function deleteCategory(id) { if(isAdmin && confirm("حذف القسم؟")) db.ref('kemo_categories').set(categories.filter(c => c.id !== id)); }
        
        function renderCategoriesUI() {
            document.getElementById('p-category').innerHTML = `<option value="none">بدون قسم</option>` + categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('') + `<option value="__NEW__">➕ إضافة قسم جديد...</option>`;
            document.getElementById('admin-categories-list').innerHTML = categories.map(c => `<span style="background:var(--bg-dark); padding:5px 15px; border-radius:20px; border:1px solid var(--border-color); display:flex; gap:10px;">${c.name} <i class="fa-solid fa-xmark" style="color:var(--danger);cursor:pointer;" onclick="deleteCategory('${c.id}')"></i></span>`).join('');
            document.getElementById('store-category-filter').innerHTML = `<button class="cat-btn ${currentFilter === 'all' ? 'active' : ''}" onclick="filterCategory('all', this)"><i class="fa-solid fa-border-all"></i> الكل</button>` + categories.map(c => `<button class="cat-btn ${currentFilter === c.name ? 'active' : ''}" onclick="filterCategory('${c.name}', this)"><i class="fa-solid fa-gamepad"></i> ${c.name}</button>`).join('');
        }
        function filterCategory(cat, btn) { currentFilter = cat; renderCategoriesUI(); renderProducts(); }

        // ================= السلة والمفضلة =================
        function closeAllSidebars() { document.getElementById('cart-sidebar').classList.remove('active'); document.getElementById('wishlist-sidebar').classList.remove('active'); document.getElementById('main-overlay').classList.remove('active'); }
        function openCart() { closeAllSidebars(); document.getElementById('cart-sidebar').classList.add('active'); document.getElementById('main-overlay').classList.add('active'); renderCart(); }
        function openWishlist() { closeAllSidebars(); document.getElementById('wishlist-sidebar').classList.add('active'); document.getElementById('main-overlay').classList.add('active'); renderWishlist(); }

        function addToCart(id) {
            const product = products.find(p => p.id === id); if(!product) return;
            if(product.qty <= 0) return showToast("نفدت الكمية!", true);
            const existing = cart.find(item => item.id === id);
            if(existing) { if(existing.qty < product.qty) { existing.qty++; showToast("تم زيادة الكمية"); } else { showToast("وصلت لأقصى كمية", true); }
            } else { cart.push({ id: product.id, name: product.name, price: product.price, image: product.image, maxQty: product.qty, qty: 1 }); showToast("أضيف للسلة 🛒"); }
            saveCart();
        }

        function updateCartQty(id, change) {
            const item = cart.find(i => i.id === id); if(!item) return;
            let newQty = item.qty + change;
            if(newQty > item.maxQty) return showToast("لا يوجد كمية إضافية", true);
            if(newQty <= 0) removeFromCart(id); else { item.qty = newQty; saveCart(); }
        }
        function removeFromCart(id) { cart = cart.filter(item => item.id !== id); saveCart(); }
        function saveCart() { localStorage.setItem('kemo_cart_gaming', JSON.stringify(cart)); renderCart(); }

        function renderCart() {
            const container = document.getElementById('cart-items'); let total = 0, count = 0; container.innerHTML = '';
            if(cart.length === 0) container.innerHTML = '<div style="text-align:center;color:gray;">السلة فارغة</div>';
            else {
                cart.forEach(item => {
                    total += (item.price * item.qty); count += item.qty;
                    container.innerHTML += `<div class="cart-item"><img src="${item.image}"><div class="cart-item-details"><div class="cart-item-title">${item.name}</div><div style="color:var(--primary);">${item.price} ج.م</div><div class="qty-controls" style="display:flex;gap:10px;margin-top:5px;"><button style="background:transparent;color:white;border:none;font-size:18px;" onclick="updateCartQty(${item.id}, -1)">-</button><span>${item.qty}</span><button style="background:transparent;color:white;border:none;font-size:18px;" onclick="updateCartQty(${item.id}, 1)">+</button></div></div><button class="remove-item" onclick="removeFromCart(${item.id})"><i class="fa-solid fa-trash"></i></button></div>`;
                });
            }
            document.getElementById('cart-total-price').innerText = total; document.getElementById('cart-badge-count').innerText = count;
        }

        // دوال المفضلة
        function toggleLike(id) {
            if(likes.includes(id)) { likes = likes.filter(l => l !== id); } else { likes.push(id); showToast("أضيف للمفضلة ❤️"); }
            localStorage.setItem('kemo_likes_gaming', JSON.stringify(likes));
            renderProducts(); updateWishlistBadge();
            if(document.getElementById('wishlist-sidebar').classList.contains('active')) renderWishlist();
        }
        function updateWishlistBadge() { document.getElementById('wishlist-badge-count').innerText = likes.length; }
        function renderWishlist() {
            const container = document.getElementById('wishlist-items'); container.innerHTML = '';
            if(likes.length === 0) { container.innerHTML = '<div style="text-align:center;color:gray;">لا توجد منتجات مفضلة</div>'; return; }
            likes.forEach(id => {
                const p = products.find(p => p.id === id);
                if(p) {
                    container.innerHTML += `<div class="cart-item"><img src="${p.image}"><div class="cart-item-details"><div class="cart-item-title">${p.name}</div><div style="color:var(--primary);">${p.price} ج.م</div></div><button class="btn btn-cart" style="width:auto;padding:10px;" onclick="addToCart(${p.id})"><i class="fa-solid fa-plus"></i></button><button class="remove-item" onclick="toggleLike(${p.id})"><i class="fa-solid fa-trash"></i></button></div>`;
                }
            });
        }

        function checkoutWhatsApp() {
            if (!currentUser) { showToast("يرجى تسجيل الدخول أولاً!", true); openAuthModal('login'); return; }
            if(cart.length === 0) return showToast("السلة فارغة!", true);
            const playerId = document.getElementById('customer-game-id').value.trim();
            if(!playerId) return showToast("اكتب الـ ID الخاص بك!", true);

            const orderId = 'ORD-' + Math.floor(1000 + Math.random() * 9000);
            let total = 0; let msg = `مرحباً Kemo Store 👋%0Aيوجد طلب شحن جديد! 🚀%0A%0A🔖 *رقم الطلب:* #${orderId}%0A👤 *اسم العميل:* ${currentUser.displayName}%0A🎮 *الـ ID / الحساب:* *${playerId}*%0A%0A📦 *المنتجات:*%0A`;
            const orderDataToSave = { id: orderId, date: new Date().toLocaleString('ar-EG'), playerId: playerId, items: cart, status: "تم إرسال الطلب", total: 0 };

            cart.forEach((item, i) => {
                let itemTotal = item.price * item.qty; total += itemTotal;
                msg += `${i+1}- ${item.name} (الكمية: ${item.qty}) = ${itemTotal} ج.م%0A`;
                let pIndex = products.findIndex(p => p.id === item.id);
                if(pIndex !== -1) { products[pIndex].qty -= item.qty; }
            });
            orderDataToSave.total = total; msg += `%0A💰 *الإجمالي:* ${total} ج.م%0A%0Aبرجاء التنفيذ.`;

            db.ref('kemo_orders/' + currentUser.uid).push(orderDataToSave);
            db.ref('kemo_products').set(products);
            cart =[]; saveCart(); closeAllSidebars(); document.getElementById('customer-game-id').value = '';
            window.open(`https://wa.me/${whatsappNumber}?text=${msg}`, '_blank');
        }

        function openOrdersModal() {
            if(!currentUser) return;
            document.getElementById('orders-modal').style.display = 'flex';
            const container = document.getElementById('orders-list-container'); container.innerHTML = 'جاري التحميل...';
            db.ref('kemo_orders/' + currentUser.uid).once('value', (s) => {
                const orders = s.val(); container.innerHTML = '';
                if(!orders) { container.innerHTML = 'لا توجد طلبات سابقة.'; return; }
                Object.values(orders).reverse().forEach(ord => {
                    let itemsHtml = ord.items.map(i => `<li>- ${i.name} (الكمية: ${i.qty})</li>`).join('');
                    container.innerHTML += `<div class="order-card"><div class="order-card-header"><span class="order-id">#${ord.id}</span><span>${ord.date}</span></div><ul>${itemsHtml}</ul><div style="display:flex; justify-content:space-between; margin-top:10px; color:var(--primary);"><span>${ord.status}</span><span style="font-weight:bold;">${ord.total} ج.م</span></div></div>`;
                });
            });
        }
        function closeOrdersModal() { document.getElementById('orders-modal').style.display = 'none'; }

        db.ref('kemo_products').on('value', (s) => { products = s.val() ||[]; renderProducts(); renderCart(); updateWishlistBadge(); });

        document.getElementById('p-image').addEventListener('change', function(e) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image(); img.onload = function() {
                    const canvas = document.createElement('canvas'); const MAX = 600; let w = img.width, h = img.height;
                    if(w > h) { if(w > MAX) { h *= MAX / w; w = MAX; } } else { if(h > MAX) { w *= MAX / h; h = MAX; } }
                    canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    uploadedImageData = canvas.toDataURL('image/jpeg', 0.6); 
                }; img.src = event.target.result;
            }; reader.readAsDataURL(file);
        });

        function addProduct() {
            if(!isAdmin) return;
            let cat = document.getElementById('p-category').value; const newCat = document.getElementById('p-new-cat').value.trim();
            const name = document.getElementById('p-name').value; const price = document.getElementById('p-price').value; 
            const qty = parseInt(document.getElementById('p-qty').value) || 0; const msg = document.getElementById('p-msg').value;
            
            if(cat === '__NEW__') { if(!newCat) return; cat = newCat; db.ref('kemo_categories').set([...categories, { id: Date.now().toString(), name: newCat }]); }
            if(!name || !price || !uploadedImageData || qty <= 0) return showToast("أكمل البيانات بـ كمية صحيحة", true);
            
            const btn = document.getElementById('add-btn'); btn.innerHTML = 'جاري...'; btn.disabled = true;
            db.ref('kemo_products').set([...products, { id: Date.now(), category: cat, image: uploadedImageData, name: name, price: price, qty: qty, waMessage: msg }]).then(() => {
                showToast("تم الحفظ!");['p-name', 'p-price', 'p-qty', 'p-image', 'p-msg'].forEach(id => document.getElementById(id).value = '');
                uploadedImageData = ""; btn.innerHTML = 'حفظ المنتج'; btn.disabled = false;
            });
        }
        function deleteProduct(id) { if(isAdmin && confirm("حذف؟")) db.ref('kemo_products').set(products.filter(p => p.id !== id)); }
        function switchTab(tab) { document.getElementById('store-section').style.display = tab === 'store' ? 'block' : 'none'; document.getElementById('admin-section').style.display = tab === 'admin' ? 'block' : 'none'; }

        function renderProducts() {
            const storeList = document.getElementById('products-list'); const adminList = document.getElementById('admin-products-list');
            storeList.innerHTML = ''; adminList.innerHTML = '';
            let filtered = currentFilter !== 'all' ? products.filter(p => p.category === currentFilter) : products;

            if(filtered.length === 0) storeList.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:gray;">لا يوجد شحن هنا</div>`;
            else {[...filtered].reverse().forEach(p => {
                    const outOfStock = p.qty <= 0; const isLiked = likes.includes(p.id);
                    let stockBadge = `<span class="cat-badge" style="background:var(--primary); color:#000;">متاح: ${p.qty}</span>`;
                    let stockWarn = '';
                    if(outOfStock) { stockBadge = `<span class="cat-badge" style="background:var(--danger);">نفدت الكمية</span>`; }
                    else if(p.qty <= 10) { stockWarn = `<div class="stock-warning">🔥 قربت تخلص! متبقي ${p.qty} فقط</div>`; }

                    storeList.innerHTML += `
                        <div class="product-card" ${outOfStock ? 'style="opacity:0.6"' : ''}>
                            <div class="product-img-wrapper">
                                <button class="like-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike(${p.id})"><i class="${isLiked ? 'fa-solid' : 'fa-regular'} fa-heart"></i></button>
                                ${stockBadge}
                                <img src="${p.image}">
                            </div>
                            <div class="product-info">
                                <h3 class="product-title">${p.name}</h3>
                                ${stockWarn}
                                <div class="product-price">${p.price} <span>ج.م</span></div>
                                <button class="btn btn-cart" ${outOfStock ? 'disabled style="background:gray;"' : `onclick="addToCart(${p.id})"`}>${outOfStock ? 'نفدت الكمية' : '<i class="fa-solid fa-cart-plus"></i> أضف للسلة'}</button>
                            </div>
                        </div>`;
                });
            }

            [...products].reverse().forEach(p => {
                adminList.innerHTML += `
                    <div class="product-card">
                        <div class="product-img-wrapper"><span class="cat-badge">المخزن: ${p.qty}</span><img src="${p.image}"></div>
                        <div class="product-info">
                            <h3 class="product-title">${p.name}</h3>
                            <div class="product-price">${p.price} <span>ج.م</span></div>
                            <button class="btn btn-delete" onclick="deleteProduct(${p.id})"><i class="fa-solid fa-trash"></i> حذف</button>
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
